name: Feature request
description: Suggest an idea for Citizen
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What frustration or limitation are you experiencing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've considered.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to related issues, etc.
