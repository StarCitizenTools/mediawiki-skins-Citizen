name: 📖 Docs CI

on:
  pull_request:
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 🩹 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Lint docs
        working-directory: docs
        run: npm run lint

      - name: Run docs tests
        working-directory: docs
        run: npm test

  build:
    name: 🏗️ Build
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build
        working-directory: docs
        env:
          DOCS_VERSION: main
        run: npm run docs:build
